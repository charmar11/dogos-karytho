services:
  - type: web
    name: dogos-karytho-bot
    env: node
    plan: free
    rootDir: bot-server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: BOT_TOKEN
        sync: false
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: NOTIFY_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
